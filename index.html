<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sana bir sorum var...</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=Pacifico&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Yüzen kalpler arkada kalacak -->
    <div class="floating-hearts" id="floatingHearts"></div>

    <div class="card" id="mainCard">
        <div class="image-wrapper">
            <!-- Buraya attığın fotoğraf gelecek! Adını resim.jpg yapıp bu klasöre atman yeterli. -->
            <img id="mainImage" src="resim.jpg" alt="Siz :)">
        </div>
        
        <h1 id="questionText">
            <span class="highlight">Merhaba journeytodevv 🌸</span><br>
            Seninle tanışmayı çok isterim,<br>bana bir şans verir misin? 👉👈
        </h1>
        
        <div class="buttons-container" id="buttonsContainer">
            <button class="btn btn-yes" id="yesBtn">Evet! 🥰</button>
            <button class="btn btn-no" id="noBtn">Hayır... 🥺</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
